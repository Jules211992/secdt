Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer-fabric-1:7050
      - orderer-fabric-2:7050
      - orderer-fabric-3:7050

  - &PeerOrg
    Name: PeerMSP
    ID: PeerMSP
    MSPDir: /home/ubuntu/secdt-fabric/crypto-config/peerOrganizations/secdt.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('PeerMSP.admin','PeerMSP.peer','PeerMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('PeerMSP.admin','PeerMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('PeerMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('PeerMSP.peer')"
    AnchorPeers:
      - Host: peer-fabric-1
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Application: &ApplicationDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer-fabric-1:7050
    - orderer-fabric-2:7050
    - orderer-fabric-3:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 500
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 2 MB
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  EtcdRaft:
    Consenters:
      - Host: orderer-fabric-1
        Port: 7050
        ClientTLSCert: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/orderers/orderer-fabric-1.secdt.com/tls/server.crt
        ServerTLSCert: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/orderers/orderer-fabric-1.secdt.com/tls/server.crt
      - Host: orderer-fabric-2
        Port: 7050
        ClientTLSCert: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/orderers/orderer-fabric-2.secdt.com/tls/server.crt
        ServerTLSCert: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/orderers/orderer-fabric-2.secdt.com/tls/server.crt
      - Host: orderer-fabric-3
        Port: 7050
        ClientTLSCert: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/orderers/orderer-fabric-3.secdt.com/tls/server.crt
        ServerTLSCert: /home/ubuntu/secdt-fabric/crypto-config/ordererOrganizations/secdt.com/orderers/orderer-fabric-3.secdt.com/tls/server.crt
  Organizations:
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  SecDTSystemGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Consortiums:
      SecDTConsortium:
        Organizations:
          - *PeerOrg

  SecDTChannel:
    Consortium: SecDTConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *PeerOrg
